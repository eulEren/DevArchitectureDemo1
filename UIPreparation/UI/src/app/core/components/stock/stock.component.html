<div class="card">
    <div class="card-header">
        <h4>Depo</h4>
    </div>

    <div class="card-body">
        <div>
            <select [(ngModel)]="stockProductId">
                <option [value]="0">Ürün Seçiniz</option>
                <option *ngFor="let product of products" [value]="product.id">{{product.name}}</option>
            </select>

            <label>
                Adet
                <input type="number" [(ngModel)]="stockQuantity">
            </label>

            <label>
                <input type="checkbox" [(ngModel)]="stockIsReadyForSale">
                Satışa Hazır
            </label>

            <button type="button" (click)="addStock()">
                Stok Ekle
            </button>

            <button type="button" (click)="updateStock()">
                Stoğu Güncelle
            </button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Stok ID</th>
                    <th>Ürün</th>
                    <th>Adet</th>
                    <th>Satışa Hazır</th>
                    <th>Stok İşlemleri</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let stock of stocks">
                    <td>{{stock.id}}</td>
                    <td>{{getProductName(stock.productId)}}</td>
                    <td>{{stock.quantity}}</td>
                    <td>{{stock.isReadyForSale ? "Evet" : "Hayır"}}</td>
                    <td>
                        <button type="button" (click)="selectStock(stock)">
                            Stoğu Düzenle
                        </button>

                        <button type="button" (click)="deleteStock(stock)">
                            Stoğu Sil
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
