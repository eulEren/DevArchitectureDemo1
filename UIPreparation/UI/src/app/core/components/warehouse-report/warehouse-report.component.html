<div class="card">
    <div class="card-header">
        <h4>Depo Raporu</h4>
    </div>

    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Stok ID</th>
                    <th>Ürün</th>
                    <th>Adet</th>
                    <th>Satışa Hazır</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let stock of stocks">
                    <td>{{stock.id}}</td>
                    <td>{{getProductName(stock.productId)}}</td>
                    <td>{{stock.quantity}}</td>
                    <td>{{stock.isReadyForSale ? "Evet" : "Hayır"}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
